<nav id="gallery-pagination" hx-swap-oob="true" aria-label="Image pagination">
  {% if page_obj.paginator.num_pages > 1 %}
    {% if page_obj.has_previous %}
      <button class="pagination-btn pagination-prev"
              hx-get="{% url 'gallery' %}"
              hx-target="#gallery-results"
              hx-include="#filter-form"
              hx-vals='{"page": "{{ page_obj.previous_page_number }}"}'
              hx-push-url="true">
        &larr; Previous
      </button>
    {% endif %}

    <span class="pagination-info">Page {{ page_obj.number }} of {{ page_obj.paginator.num_pages }}</span>

    {% if page_obj.has_next %}
      <button class="pagination-btn pagination-next"
              hx-get="{% url 'gallery' %}"
              hx-target="#gallery-results"
              hx-include="#filter-form"
              hx-vals='{"page": "{{ page_obj.next_page_number }}"}'
              hx-push-url="true">
        Next &rarr;
      </button>
    {% endif %}
  {% endif %}
</nav>
